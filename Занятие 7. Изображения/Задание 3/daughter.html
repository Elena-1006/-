<html>
<head><title>Дочка</title>
</head>
<body>
Всем известно, что мужчина <br>
Страстно ждет рождения сына,<br>
Только дочь с течением дней<br>
Обожает все сильней.<br>
<br>
Теплый маленький комочек,<br>
Кружевной смешной кулечек,<br>
Пусть пока в ней мало веса,<br>
Дочка - папина принцесса.<br>
<br>
Пусть же вырастет она<br>
И красива, и умна,<br>
</body>
</html>
