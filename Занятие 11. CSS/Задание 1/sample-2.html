<!doctype html>
<html lang="ru">
	<head> 
		<meta charset="UTF-8">
		<title>Внедренные стили</title>
	
	<!-- Внедрение -->
		
		<style>
			div.new_font{
				font-family: Courier;
				font-size: 18pt ;
			}
			div#bg{
				background-color: #c0c0c0;
			}

			div.text{
				color: red;
			}
		</style>
	</head> 
	<body> 

	<!-- Внедрение -->

		<div class="new_font"> Заменили встроенные настройки на внедренный стиль. Класс new_font</div>

		<div id="bg"> Заменили встроенные настройки на внедренный стиль. Идентификатор bg</div>

		<div class="text"> Заменили встроенные настройки на внедренный стиль. Класс text</div>

	</body>
</html>
